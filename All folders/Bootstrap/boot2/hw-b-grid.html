<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>
  <div class="container">
  <!-- Row with three equal columns -->
  <div class="row g-3">
    <div class="col-4  bg-primary text-white p-2 d-flex align-items-start justify-content-start">.col-4</div>
    <div class="col-4  bg-primary text-white p-2 d-flex align-items-start justify-content-start">.col-4</div>
    <div class="col-4  bg-primary text-white p-2 d-flex align-items-start justify-content-start">.col-4</div>
  </div>

  <!-- Full-width column -->
  <div class="row g-3 mt-3">
    <div class="col-12 bg-primary text-white p-2 d-flex align-items-start justify-content-start">.col-12</div>
  </div>

  <!-- Two equal halves -->
  <div class="row g-3 mt-3">
    <div class="col-6  bg-primary text-white p-2 d-flex align-items-start justify-content-start">.col-6</div>
    <div class="col-6  bg-primary text-white p-2 d-flex align-items-start justify-content-start">.col-6</div>
  </div>

  <!-- Mixed widths -->
  <div class="row g-3 mt-3">
    <div class="col-8  bg-primary text-white p-2 d-flex align-items-start justify-content-start">.col-8</div>
    <div class="col-2  bg-primary text-white p-2 d-flex align-items-start justify-content-start">.col-2</div>
    <div class="col-2  bg-primary text-white p-2 d-flex align-items-start justify-content-start">.col-2</div>
  </div>
</div>
</body>

</html>
