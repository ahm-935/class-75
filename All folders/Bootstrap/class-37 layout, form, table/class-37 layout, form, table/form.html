<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="assets/css/bootstrap.css">
    <style>
        .custom-input {
            width: 100%;
            display: block;
            padding: 10px 8px;
            border: 1px solid #820e0e;
            font-size: 16px;
            border-radius: 5px;
        }

        .custom-input:focus {
            outline: 5px solid #047517;
        }
    </style>
</head>

<body>
    <div class="container py-5">
        <div class="row g-3">
            <div class="col-lg-12">
                <form action="">
                    <div class="text-center">
                        <label for="" class="form-label">Name</label>
                    </div>
                    <label for="" class="form-label d-block text-center text-primary-emphasis">Name</label>
                    <input type="text" class="form-control border-primary mb-3">
                    <textarea class="form-control border-primary mb-3"></textarea>
                    <input type="text" class="custom-input mb-3">
                    <select class="form-select mb-3">
                        <option selected>Open this select menu</option>
                        <option value="1">One</option>
                        <option value="2">Two</option>
                        <option value="3">Three</option>
                    </select>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" value="" id="checkDefault">
                        <label class="form-check-label" for="checkDefault">
                            Default checkbox
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" value="" id="checkDefault">
                        <label class="form-check-label" for="checkDefault">
                            Default checkbox
                        </label>
                    </div>
                    <div>
                        <input type="checkbox">
                        <label for="">Checkbox</label>
                    </div>
                    <div class="input-group mb-3">
                        <span class="input-group-text" id="basic-addon1">Name</span>
                        <input type="text" class="form-control" placeholder="First name">
                        <input type="text" class="form-control" placeholder="Last name">
                        <button class="btn btn-outline-primary">Submit</button>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
                        <label for="floatingInput">Email address</label>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
