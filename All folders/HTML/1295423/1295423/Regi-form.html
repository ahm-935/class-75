<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>

<body>
    <table>
        <form align="center">
            <label for="name">Employee Name:</label>
            <input type="text" id="name" name="name"><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email"><br><br>

            <label for="phone">Phone:</label>
            <input type="number" id="phone" name="phone"><br><br>


            <label for="gender">Gender:</label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label><br><br>

            <label for="Country">Country:</label>
            <select id="Country" name="Country">
                <option value="Bangladesh">Bangladesh</option>
                <option value="Italy">Italy</option>
                <option value="USA">USA</option>
                <option value="UK">UK</option>
            </select><br><br>

            <label for="address">Address:</label>
            <textarea id="address" name="address" rows="2" cols="40"></textarea><br><br>

            <label for="Skills">Skills:</label>
            <input type="checkbox" id="skills1" name="skills" value="HTML">
            <label for="skills1">HTML</label>
            <input type="checkbox" id="skills2" name="skills" value="CSS">
            <label for="skills2">CSS</label>
            <input type="checkbox" id="skills3" name="skills" value="JavaScript">
            <label for="skills3">JavaScript</label><br><br>


            <!-- <label for="password">Password:</label>
        <input type="password" id="password" name="password"><br><br>

        <label for="confirm-password">Confirm Password:</label>
        <input type="password" id="confirm-password" name="confirm-password"><br><br> -->

            <button type="submit">Register</button> &nbsp; &nbsp;
            <button type="reset">Reset</button>
        </form>
    </table>
</body>

</html>
