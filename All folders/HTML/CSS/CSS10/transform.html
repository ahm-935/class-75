<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
        }

        .img-wrap,
        .img-wrap2 {
            border: 1px solid rgb(0, 0, 0);
            width: 200px;
            height: 200px;
            overflow: hidden;
        }

        .img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 1s;
        }

        .img-wrap img:hover {
            transform: scale(1.5);
        }

        .box1 {
            width: 200px;
            height: 200px;
            background-color: rgb(138, 31, 31);
            transition: 2s;
        }

        .box1:hover {
            transform: rotateY(40deg);
        }

        .box2 {
            width: 200px;
            height: 200px;
            padding: 20px;
            background-color: rgb(31, 138, 40);
            transition: 2s;
            transform: skew(45deg)
        }

        .img-wrap2 {
            position: relative;
            top: 0px;
            left: 0px;
            transition: 2s;
        }

        .img-wrap2 {
            /* position: absolute; */
            top: 100px;
            left: 100px;
        }
        h2{
            position: absolute;
            top: 0px;
            left: 0px;
            color: blueviolet;
            transform: translate(-5);
        }
    </style>
</head>

<body>
    <div class="img-wrap">
        <img src="assets/img/iphone-16-20250812163001.jpg" width="200" alt="">
    </div> <br>
    <div class="box1"> </div>
    <div class="box2">

    </div>
    <div class="img-wrap2">
        <h2>Hello</h2>
         <img src="assets/img/samsung.png" width="200" alt="">

    </div>

</body>

</html>
