<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Exect match */
        [class="div"] {
            color: red;
        }
        /* Start with */
        [class^="div"] {
            background-color: blue;
        }
        /* End with */
        [class$="div"] {
            /* background-color: rgb(0, 255, 4); */
        }
        /* Contains (anywhere) */
        [class*="div"] {
            /* border: 1px solid black; */
        }
        div div {
            /* background-color: greenyellow; */
        }
        /* Direct child */
        .my-root > div {
            border: 1px solid rgb(44, 249, 21);
        }
        /* Adjacent sibling (next all sibling) */
        .second-div ~ div {
            background-color: aqua;
        }
        /* Next Sibling */
        .second-div + div {
            background-color: pink;
        }
    </style>
</head>
<body class="my-root">
    <div class="div-first">Div 1</div>
    <div class="second-div">Div 2</div>
    <div class="mydivname">Div 3</div>
    <div class="div">Div 4</div>
    <div>
        <div>Div 5</div>
        <div>Div 6</div>
        <div>Div 7</div>
    </div>
</body>
</html>
