<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,body{
            font-size: 30px;
        }
    </style>
</head>
<body>
    <!-- 
        CSS Units
        ------------
        *** Absolute units ***
        px - pixels
        cm - centimeters
        mm - millimeters
        in - inches
        pt - points

        *** Relative units ***
        em - element parent
        rem - root em
        % - percentage
        vw - viewport width
        vh - viewport height
    -->

    <div style="font-size: 20px;">
        <p>hello</p>
        <p style="font-size: 2em;">hello</p>
        <p style="font-size: 2rem;">hello</p>
        <p style="font-size: 20vw;">hello</p>
    </div>
</body>
</html>
