<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            font-size: 20px;
        }
    </style>
    <!-- 
    CSS units
    ---------
    *** Absolute units ***
    px - pixels
    cm - centimeters
    mm - millimeters
    in - inches
    pt - points
    
    *** Relative units ***
    em - ems (1em = 16px) Parent font size
    rem - root ems     root elemeent font size
    % - percentage
    vw - viewport width
    vh - viewport height
    -->
</head>
<body>
    <div style="font-style: 20px;">
        <p>Hello</p>
        <p style="font-size:2.5em;">Hello</p>
        <p style="font-size:2.5rem;">Hello</p>
        <p style="font-size:2.5%; ">Hello</p>
        <p style="font-size:2.5vw;">Hello</p>
        <p style="font-size:2.5vh;">Hello</p>
    </div>
</body>
</html>
