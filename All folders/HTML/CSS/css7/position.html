<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 70px;
            height: 50px;
            background-color: rgb(141, 200, 214);
            margin-bottom: 10px;
            position: static;
            

        }

        .box:nth-child(2) {
            background-color: aquamarine;
            position: fixed;
            /* margin-left: 10px; */
            top: -10px;
            right: 5px;
        }

        .box:nth-child(3) {
            background-color: rgb(41, 155, 41);
            position: sticky;
            top: 20px;
        }

        .div-box {
            margin-left: 50px;
            background-color: rgb(41, 155, 41);
            position: sticky;
            top: 10px;
        }

        .box:nth-child(4) {
            background-color: rgb(143, 68, 68);
            position: relative;
            /* top: 10px; */
            bottom: 5px;
            left: auto;
        }

        .box:nth-child(5) {
            background-color: rgb(181, 240, 126);
            position: absolute;
            top: 10px;
            left: 10px;

        }
    </style>
</head>

<body>
    <div class="box">Static</div>
    <div class="box">Fixed</div>
    <div class="box">Sticky</div>
    <div class="box">Relative</div>
    <div class="box">Absolute</div>

    <div style="background-color: aqua; height: 400px;">
        <div class="box div-box">Box under div</div>
    </div>
    <div style="background-color: rgb(163, 117, 117); height: 300px;" position: relative;>
        <div style="height: 100px; width: 100px; 
        background-color: rgb(201, 204, 18); position: absolute;
        bottom: 50px;
        right: 50px;">Absoute inside relative</div>

    </div>

    <div style="height: 1500px;"></div>
</body>

</html>
