<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Document</title>
    <style>
        .box {
            width: 100px;
            height: 100px;
            background-color: rgb(80, 151, 128);
            margin-bottom: 10px;
        }
        .box:nth-child(1) {
            background-color: rgb(133, 133, 9);
            position: static;
            width: 100%;
            height: 100px;
        }

        .box:nth-child(2) {
            background-color: rgb(241, 241, 201);
            position: sticky;
            top: 0px;
            width: 100%;
            height: 40px;
            text-align: center;
        }

        .box:nth-child(3) {
            background-color: rgb(180, 21, 154);
            height: 50px;
            width: 40px;
            position: fixed;
            bottom: 30px;
            border-radius: 40px 50px 40px 50px;
            right: 0px;
        }

        .box:nth-child(4) {
            background-color: rgb(122, 5, 70);
            position: sticky;;
            height: 40px;
        }

    </style>
</head>
