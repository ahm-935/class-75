<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        * {
            box-sizing: border-box;
        }

        .logo {
            width: 100px;
            height: 50px;
        }

        .top-section {
            background-color: rgb(69, 143, 119);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 20px;
        }
        input[type="search"] {
            width: 100px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .menu a {
            text-decoration: none;
            background-color: rgb(5, 79, 38);
            color: #fff;
            padding: 10px 20px;
            display: inline-block;
        }

        .menubar a {
            text-decoration: none;
            background-color: rgb(17, 107, 29);
            color: #fff;
            padding: 15px 15px;
            display: inline-block;
            margin-bottom: 10px;
        }


        .menubar a:hover {
            background-color: rgb(122, 11, 11);
        }

        .menu a:hover {
            background-color: rgb(122, 11, 11);
        }

        header img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .header-content {
            display: flex;
            gap: 5px;
        }



       
        
        

        footer {
            background-color: rgb(0, 0, 0);
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 150px;
        }

        aside {
            background-color: rgb(255, 255, 255);
            padding: 05px;
            color: #fff;
            height: 200px;
            inline-size: 140px;
        }
    </style>
</head>

<body>

    <div class="top-section">
        <img src="assets/img/logo.jpg" alt="logo" class="logo">
        <nav class="menu">
            <a href="">Home</a>
            <a href="">About</a>
            <a href="">Contact</a>
        </nav>
        <input type="search" name="search" id="search-input" placeholder="Search...">
    </div>
    <header>
        <div class="header-content">
            <aside>
                <nav class="menubar">
                    <a href="">Catagory-1</a>
                    <a href="">Catagory-2</a>
                    <a href="">Catagory-3</a>
                    <a href="">Catagory-4</a>
                 /
                </nav>
            </aside>
            <img src="assets/img/bg.jpg" alt="bg">
            </div>
    </header>
    
    <div style="height: 500px;"></div>

    <footer>
        <small>Copyright &copy; 2026: All Rights Reserved</small>
    </footer>
</body>

</html>
</body>

</html>
