<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table , Cellspacing, Cellpadding</title>
</head>

<body>
    <!-- <table border="1" cellspacing="5" cellpadding="0" width="70%" align="right"> -->
    <table border="1" cellspacing="5" cellpadding="0" width="70%" style="margin: auto;">
        <caption>
            Timetable
        </caption>
        <th>Period1</th>
        <th>Period2</th>
        <th></th>
        <th>Period3</th>
        <tr>
            <td>Class1</td>
            <td>Class4</td>
            <th rowspan="3" valign="top">Break</th>
            <td>Class7</td>
        </tr>
        <tr>
            <td>Class2</td>
            <td>Class5</td>
            <td>Class8</td>
        </tr>
        <tr>
            <td>Class3</td>
            <td>Class6</td>
            <td>Class9</td>
        </tr>

    </table>
</body>

</html>
