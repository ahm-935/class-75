<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic vs Non Semantic</title>
</head>
<body>
    <!-- Semantic Elements -->
    <h1>Heading Tag</h1>
    <p>Para</p>
    <header>Header Tag</header>
    <nav>Nav Tag</nav>
    <main>Main Tag</main>
    <section>Section Tag</section>
    <article>Article Tag</article>
    <aside>Aside Tag</aside>
    <footer>Footer Tag</footer>
    <a href="">Anchore Tag</a>    

    <!-- Non Semantic Elements -->
     <div>Div Tag</div> <!-- Block level element -->
     <span>Span Tag</span> <!-- Inline element -->
</body>
</html>
