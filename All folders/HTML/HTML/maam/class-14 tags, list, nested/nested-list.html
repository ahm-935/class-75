<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested List</title>
</head>

<body>
    <ul>
        <li>Item 1</li>
        <li>
            Item 2
            <ul>
                <li>
                    Item 2.1
                    <ul>
                        <li>Item 2.1.1</li>
                        <li>Item 2.1.2</li>
                    </ul>
                </li>
                <li>
                    Item 2.2
                    <ul>
                        <li>Item 2.2.1</li>
                        <li>Item 2.2.2</li>
                    </ul>
                </li>                    
                <li>Item 2.3</li>
            </ul>
        </li>
        <li>
            <ol>
                <li><b>1</b></li>
                <li>2</li>
            </ol>
        </li>
        <li>Item 3</li>
        <li>
            Item 4
            <ol>
                <li>Item 4.1</li>
                <li>Item 4.2</li>
                <li>Item 4.3</li>
            </ol>
        </li>
        <li>Item 5</li>
    </ul>
</body>

</html>
