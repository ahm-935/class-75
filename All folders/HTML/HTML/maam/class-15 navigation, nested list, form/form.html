<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Input</title>
</head>
<body>
    <form>
        <label>Text</label> 
        <input type="text" >
         <br><br>
        <label>Email</label> 
        <input type="email">
        <br><br>
        <label>Password</label>
        <input type="password">
        <br><br>
        <label>Date</label>
        <input type="date">
        <br><br>
        <label>Time</label>
        <input type="datetime-local">
        <br><br>
        <label>Number</label>
        <input type="number">
        <br><br>
        <label>Chackbox</label>
        <input type="checkbox"> HTML
        <input type="checkbox"> CSS
        <input type="checkbox"> JS
        <br><br>
        <label>Radio</label> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
        <input type="radio"> Male
        <input type="radio"> Female
        <br><br>
        <label>File</label>
        <input type="file">
        <br><br>
        <input type="button" value="Don't Submit">
        <input type="reset" value="Reset">
        <input type="submit">
         <!-- or -->
          <br><br>
         <button type="button">Don't Submit</button>
         <button type="reset">Reset &lt;gf&gt;</button>
         <button type="submit">Submit</button>
    </form>
</body>
</html>
