<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Input</title>
</head>
<body>
    <form action="submit.html" method="GET">
        <input type="hidden" name="token" value="123456">
        <fieldset>
            <legend align="center">Form Input</legend>
            <label for="firstName">Text</label>
            <input type="text" name="first_name" id="firstName" class="first-name" required placeholder="Enter your name" value="Mina">
            <br><small><i>This field is required</i></small>
             <br><br>
            <label>Email</label> 
            <input type="email" name="email" size="30" placeholder="Your email address" value="" readonly>
            <br><br>
            <label>Password</label>
            <input type="password" required value="123">
            <br><br>
            <label>Date</label>
            <input type="date" value="2026-02-10" disabled>
            <br><br>
            <label>Time</label>
            <input type="datetime-local">
            <br><br>
            <label>Number</label>
            <input type="number" value="3" min="1" max="5">
        </fieldset>
        <br>
        <fieldset>
            <legend>Checkbox & Radio</legend>
            <label>Chackbox</label>
            <input type="checkbox" id="html" name="skill" checked value="html"> 
            <label for="html">HTML</label>
            <input type="checkbox" id="css" name="skill" value="css">
            <label for="css">CSS</label>
            <input type="checkbox" name="skill" disabled value="js"> JS
            <br><br>
            <label>Radio</label> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
            <input type="radio" name="sex" value="male"> Male
            <input type="radio" name="sex" value="female"> Female
            <br><br>
            <label>File</label>
            <input type="file">
        </fieldset>
        <br>
        <label for="css">Another CSS</label>
        <input type="button" value="Don't Submit">
        <input type="reset" value="Reset">
        <input type="submit">
         <!-- or -->
          <br><br>
         <button type="button">Don't Submit</button>
         <button type="reset">Reset &lt;gf&gt;</button>
         <button type="submit">Submit</button>
    </form>
</body>
</html>
