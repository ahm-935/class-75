<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <nav>
        <a href="list.html">List</a> | 
        <a href="form.html">Form</a>
    </nav>
    <h2>Student Registration</h2>
    <form action="">
        <label for="">Trainee ID</label><br>
        <input type="number" required><br><br>
        <label for="">FN</label><br>
        <input type="text"><br><br>
        <label for="">Email</label><br>
        <input type="email"><br><br>
        <label for="">Address</label><br>
        <textarea name="" id=""></textarea><br><br>
        <label for="">District</label><br>
        <select name="" id="">
            <option value="">Dhaka</option>
            <option value="">Chittagong</option>
            <option value="">Rajshahi</option>
            <option value="">Khulna</option>
        </select><br><br>
        <label for="">Gender</label> 
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <br><br>
        <label for="">Degree</label> 
        <input type="checkbox" name="degree"> SSC
        <input type="checkbox" name="degree"> HSC
        <br><br>
        <button type="submit">Submit</button>
        <button type="reset">Cancel</button>
        <!-- OR -->
        <input type="submit" value="Register">
        <input type="reset" value="Cancel">
    </form>
</body>
</html>
