<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <table border="1">
        <tr>
            <td>1</td>
            <td>2</td>
            <td colspan="2">3</td>
        </tr>
        <tr>
            <td>4</td>
            <td>5</td>
            <td>6</td>
            <td>7</td>
        </tr>
        <tr>
            <td colspan="3">8</td>
            <td>9</td>
        </tr>
        <tr>
            <td colspan="4">10</td>
        </tr>
    </table>
    <hr>
    <!-- valign= top/bottom/middle -->
    <!-- align= left/right/center/justify -->

    <!-- <table border="1" cellspacing="0" cellpadding="20" width="80%" style="margin: auto;"> -->
    <table border="1" cellspacing="0" cellpadding="20" width="80%" align="center">
        <caption>Student List</caption>
        <tr>
            <th>Batch</th>
            <th align="right">Name</th>
            <th>ID</th>
        </tr>
        <tr>            
            <th rowspan="3" valign="top">WDPF</th>
            <td>Rakib R.</td>
            <td align="center">123</td>
        </tr>
        <tr>
            <td>Mina Akter</td>
            <td align="center">122</td>
        </tr>
        <tr>
            <td>Raju Rahman</td>
            <td align="center">245</td>
        </tr>
    </table>


    <br>
    <br>
    <br>
    <br>
    <br>
</body>
</html>
