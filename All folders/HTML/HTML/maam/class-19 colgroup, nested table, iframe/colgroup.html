<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colgroup</title>
</head>
<body>
    <table border="1" cellspacing="0" cellpadding="10" width="500">
        <colgroup>
            <col bgcolor="yellow">
            <col span="2">
            <col bgcolor="green">
        </colgroup>
        <tr height="50">
            <td >1</td>
            <td >2</td>
            <td >3</td>
            <td >4</td>
        </tr>
        <tr>
            <td>5</td>
            <td>6</td>
            <td>7</td>
            <td>8</td>
        </tr>
        <tr>
            <td>9</td>
            <td>10</td>
            <td>11</td>
            <td>12</td>
        </tr>
    </table>
</body>
</html>
