<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested Table</title>
</head>
<body>
    <table border="1" cellspacing="0" cellpadding="10">
        <caption>Ex: Nested</caption>
        <tr>
            <th rowspan="2" colspan="2">CI</th>
            <th rowspan="2">All <br>Genders</th>
            <th>BY Genders</th>
        </tr>
        <tr>
            <td>
                <table border="1">
                    <tr>
                        <th>Males</th>
                        <th>Females</th>
                    </tr>
                    <tr>
                        <td>5555</td>
                        <td>5555</td>
                    </tr>
                </table>
            </td>
        </tr>
        <tr>
            <th>Rural</th>
            <td>5545</td>
            <td>5555</td>
            <td>5454</td>
        </tr>
    </table>
</body>
</html>
