<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Styles</title>
</head>
<body>
    <ul style="list-style-type: circle;color: rgb(136, 4, 4); ">  
        <li>Coffee</li>
        <li>Tea
            <ul>
                <li>Black tea</li>
                <li>Green tea</li>
            </ul>
        </li>
        <li>Milk</li>
    </ul>
    <ol style="list-style: none;">
        <li>First item</li>
        <li>Second item
            <ol style="list-style-type:  armenian;">
                <li>Subitem one</li>
                <li>Subitem two</li>
            </ol>
        </li>
        <li>Third item</li>
    </ol>
</body>
</html>
