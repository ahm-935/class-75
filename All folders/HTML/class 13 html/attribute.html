<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute</title>
    <style>
        .bg-color {
            background-color: rgb(14, 181, 237);
        }
    </style>

</head>

<body>
    <!-- XHTML -->
    <input   />
    <input disabled="disabled" class="bg-color" />

    <hr>
    <!-- HTML5 -->

    <input accesskey="m" style="color: rgb(23, 133, 98);"   placeholder="Applicant's Name" spellcheck="true">

    <input disabled  name="User Name"    class="bg-color" title="Click">
    <br>
    <div>
        Div
    </div>
    <hr>
    <h2> Event attributes </h2>
    <br>
    <button onclick="alert()">Click Me</button> &nbsp; &nbsp; &nbsp; &nbsp;
    &RightArrow; 
    <button ondblclick="alert()">Double Click Me</button>
    <br>
    <button onmouseover="alert()">Mouse Over Me</button>
    <br>
    <button onmouseout="alert()">Mouse Out Me</button>
    <br>
    <button accesskey="i" onmousedown="alert()">Mouse Down Me</button>
    <br>
    <button onmousemove="alert()"  tabindex="5">Mouse Move Me</button>
    <br>
    <button onmouseup="alert()">Mouse Up Me</button>
    <div class="bg-color" contenteditable> This is an editable text .</div>
    <div class="bg-color" draggable="true"> This is an editable text .</div>
    <br>
    <button onkeydown="alert()">Key Down Me</button>
    <br>
    <div class="bg-color" draggable="true"  data-Trainee-ID="1295423"> This is an editable text .</div>
    <br>
    <button onkeypress="alert()"   tabindex="-1">Key Press Me</button>

    <hr>


</body>

</html>
