<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* selector{
            property: value;
        } */
         body {
            background-color: rgb(182, 221, 40);
        }
        h1 {
            color: royalblue;
            background-color: chartreuse;
        }

        p {
            color: rgb(5, 167, 167);
        }

        .para {
            color: rgb(106, 158, 58);
        }
    </style>
</head>

<body>
    <h1> CSS - Cascading Style Sheet</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
    kjhbvkd;dkf;lsuf the name of our country is Bangladesh.
    <p class="para">
        Lorem ipsum dolor sit amet consectetur adipisicing elit.
    </p>
    <p style="background-color: rgb(197, 238, 143);">What is your name?</p>

</body>

</html>
