<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page</title>
</head>

<body>
    <table border="0" cellpadding="0" cellspacing="5" align="center"  style="background-color: rgb(220, 228, 208);">
        <caption><h1>Registration Form</h1></caption>
        <tr>
            <td>
                <form>
                    <label>UserName:</label>
            <td> <input type="text" name="name"></td><br><br>
        </tr>
        <tr>
            <td><label>Password:</label></td>
            <td> <input type="password" name="password"></td><br><br>
        </tr>
        <tr>
            <td><label>City of <br>Employment:</label></td>
            <td> <select name="city">
                    <option>Select City</option>
                    <option>Bandarban</option>
                    <option>Chittagong</option>
                    <option>Comilla</option>
                    <option>Cox's Bazar</option>
                    <option>Dinajpur</option>    
                    <option>Dhaka</option>
                    <option>Faridpur</option>
                    <option>Gazipur</option>
                    <option>Gopalganj</option>
                    <option>Jamalpur</option>
                    <option>Jessore</option>
                    <option>Jhalokati</option>
                    <option>Jhenaidah</option>
                    <option>Kishoreganj</option>
                    <option>Kurigram</option>
                    <option>kustia</option> 
                    <option>khagrachari</option>      
                    <option>Khulna</option>
                    <option>Rajshahi</option>
                    <option>Rangpur</option>
                    <option>Sylhet</option>
                    <option>Tangail</option>
                    <option>Thakurgaon</option>
                </select><br><br></td>
        </tr>
        <tr>
            <td><label>Web server:</label></td>
            <td><input type="url" name="webserver"></td>
        </tr>
        <tr>
            <td>
                <label>Please specify <br>your role:</label>
            </td>
            <td>
                <input type="radio" name="role" value="admin">Admin<br>
                <input type="radio" name="role" value="user">Engineer<br>
                <input type="radio" name="role" value="guest">Manager<br>
                <input type="radio" name="role" value="other">Guest<br>
            </td>
        <tr>
            <td>Single sign-on <br>to the following:</td>
            <td>
                <input type="checkbox">Mail<br>
                <input type="checkbox">Payroll<br>
                <input type="checkbox">Self-service<br>
            </td>
        </tr>
        <tr>
            <td colspan="2" align="center"><button type="submit" value="Login"  style="background-color: rgb(143, 240, 119);">Login</button>
                <button type="reset" value="Reset"  style="background-color: rgb(166, 241, 136);">Reset</button>
            </td>
        </tr>
        </form>
        </td>
        </tr>
    </table>

</body>

</html>
