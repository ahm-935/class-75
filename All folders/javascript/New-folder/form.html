<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label for="">Name</label>
        <input type="text" name="name">
        <br><br>
        <input type="checkbox" name="agree">
        <label for="">I Agree to terms & conditions</label><br><br>
        <input type="submit" value="Submit">
    </form>

    <script>
        let form = document.querySelector('form');
        form.addEventListener('submit', function(e){
            e.preventDefault();
            // console.log(form.agree.checked);
            let agree = form.agree.checked ? "Agreed" : "Not Agreed";
            let win = window.open("","","width=500,height=500");
            win.document.write(`
            <h2>Reg. Form</h2>
            <p><b>Name</b> : ${form.name.value}</p>
            <p><b>Agreement</b> : ${agree}</p>
            <button onclick="window.close()">Close</button>
            `);
        });
    </script>
</body>
</html>
