<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container my-4">
        <div class="row">
            <div class="col-lg-5 col-md-8 col-sm-10 mx-auto">
                <div class="card">
                    <h5 class="card-header text-primary text-center">Student Form</h5>
                    <div class="card-body">
                        <form id="studentForm">
                            <div class="mb-3">
                                <label for="name" class="form-label">Name</label>
                                <input type="text" class="form-control" id="name">
                                <span class="text-danger" id="nameError"></span>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="text" class="form-control" id="email">
                                <span class="text-danger" id="emailError"></span>
                            </div>
                            <div class="mb-3">
                                <label for="">Gender</label><br>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="male" value="male">
                                    <label class="form-check-label" for="male">Male</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="female" value="female">
                                    <label class="form-check-label" for="female">Female</label>
                                </div>
                                <div class="text-danger" id="genderError"></div>
                            </div>
                            <div class="mb-3">
                                <label for="skills" id="skills">Skills</label><br>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" name="skills" id="html" value="HTML">
                                    <label class="form-check-label" for="html">HTML</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" name="skills" id="css" value="CSS">
                                    <label class="form-check-label" for="css">CSS</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" name="skills" id="js" value="JS">
                                    <label class="form-check-label" for="js">JS</label>
                                </div>
                                <div class="text-danger" id="skillsError"></div>
                            </div>
                            <div class="mb-3">
                                <label for="">District</label><br>
                                <select name="district" class="form-select">
                                    <option value="">Select District</option>
                                    <option value="Dhaka">Dhaka</option>
                                    <option value="Chittagong">Chittagong</option>
                                    <option value="Rajshahi">Rajshahi</option>
                                    <option value="Khulna">Khulna</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="">Remarks</label>
                                <textarea name="remarks" rows="3" class="form-control"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Submit</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="form.js"> </script>
    <script>
        new DynamicFormValue(`#studentForm`);
    </script>
</body>
</html>
