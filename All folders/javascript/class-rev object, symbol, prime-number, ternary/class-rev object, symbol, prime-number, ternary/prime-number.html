<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n = parseInt(prompt("Enter a number: "));
        let prime = true;

        if(n <= 1){
            prime = false;
            // document.writeln(n + " is not a prime number");
        }else{
            for(let i = 2; i < n; i++){
                if(n % i == 0){
                    prime = false;
                    break;
                    // document.writeln(n + " is not a prime number");
                }
                // if(i == n - 1){
                //     // prime = true;
                //     document.writeln(n + " is a prime number");
                // }
            }
        }

        if(prime){
            document.writeln(n + " is a prime number");
        }else{
            document.writeln(n + " is not a prime number");
        }
    </script>
</body>
</html>
