<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Closure</title>
</head>
<body>
    <script>
        function outer() {
            let a = 5;
            function inner() {
                a++;
                document.write("a: " + a + '<br>');
            }
            return inner;
        }
       
        let counter = outer();
        counter(); // a: 5
        counter(); // a: 5
        counter(); // a: 5 
    </script>
</body>
</html>
