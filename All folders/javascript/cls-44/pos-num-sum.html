<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num = 0;
        sum = 0;
        while(num >= 0){
            sum  += num; // sum = sum + num
            num = parseInt(prompt("Enter a positive number:"));
        }
        document.write(`The sum of all positive numbers is: ${sum}`);
        </script>
</body>
</html>
