    <!-- Client Side Validation--->

    <div id="data"></div>
    <form id="trainee-form">
        <label for="skills">Skills:</label><br>
        <input type="checkbox" id="html" name="skills" value="html">
        <label for="html">HTML</label><br>
        <input type="checkbox" id="css" name="skills" value="css">
        <label for="css">CSS</label><br>
        <input type="checkbox" id="javascript" name="skills" value="javascript">
        <label for="js">JavaScript</label><br>
        <div class="skill-error"></div>
        <label for="address">Address:</label><br>
        <input class="custom-input" type="text" id="address" name="address" placeholder="Enter your address">
        <br><br>
        <input type="submit" value="Submit">
    </form>
    <script>
        let form = document.forms[0];
        form.addEventListener('submit',  (e)=> {
            e.preventDefault();
            // console.log(form.address.value);
            // document.querySelector('#data').innerText = form.address.value;
            console.log(form.skills);
            let checkedSkills = 0;
            for  (let ele of form.skills) {
                if (ele.checked) checkedSkills++;

                
                //     console.log(ele.value);
                // }
                // console.log(ele.checked);
            }
            if (checkedSkills < 2) {
                document.querySelector('.skill-error').innerText = 'At least 2 skills should be selected';
            } else {
                document.querySelector('.skill-error').innerText = '';
                form.submit();
                console.log('Form submitted successfully');
            }
        })
    </script>
</body>
