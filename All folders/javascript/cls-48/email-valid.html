<body>
    <script>

        let phone = prompt("Enter a phone number ", "+8801717621918");
        let phoneRegex = /^[0-9+]{0,1}[8]{2}[0]{1}[1]{1}[3456789]{1}[0-9]{8}]$/;
        if (phoneRegex.test(phone)) {
            document.write('Valid phone number');
        } else {
            document.write('Invalid phone number');
        }
