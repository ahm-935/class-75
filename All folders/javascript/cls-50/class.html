        class Trainee{
            constructor(_fName, _lName=''){
                this.fName = _fName;
                this.lName = _lName;
            }
            fullName() {
                return this.fName + " " + this.lName;
            }
        }
        let traineeFN = prompt("Enter trainee First name");
        let traineeLN = prompt("Enter trainee Last name");
        let trainee = new Trainee(traineeFN, traineeLN);
        // console.log(trainee);
        document.write(trainee.fName);
        document.write("<br>");
        document.write(trainee.fullName());
        document.write("<br>");
        // trainee.fName = "Jarif";
        document.write(trainee.fullName());
