<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Largest Number</title>
</head>
<body>
    <script>
        let num1 = parseInt(prompt("Enter the first number:", 50));
        let num2 = parseInt(prompt("Enter the second number:", 40));
        let num3 = parseInt(prompt("Enter the third number:",60));
        if (num1 > num2 && num1 > num3) {
            document.write("The largest number is: " + num1);
        } else if (num2 > num1 && num2 > num3) {
            document.write("The largest number is: " + num2);
        } else {
            document.write("The largest number is: " + num3);
        }
    </script>
</body>
</html>
