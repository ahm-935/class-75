<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regular Expressions</title>
</head>
<body>
    
    <script>
        let email = prompt("Enter your email address:", "ahm8354@yahoo.com");
        let emailRegex = /^[a-zA-Z0-9._]{3,30}[@]{1}[a-zA-Z0-9-]{3,30}[.]{1}[a-zA-Z]{2,6}$/;
        if (emailRegex.test(email)) {
            document.write("Valid email address");
        } else {
            document.write("Invalid email address");
        }
    </script>
</body>
</html>
