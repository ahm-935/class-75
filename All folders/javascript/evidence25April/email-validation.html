<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Validation</title>
</head>
<body>
    <script>
        let email = prompt("Please enter your email address:","hgdkh@example.com");
        let emailRegex = /^[a-zA-Z0-9._]{3,30}[@]{1}[a-zA-Z0-9._]{3,30}[.]{1}[a-zA-Z]{2,6}$/; 
        if (emailRegex.test(email)) {
            document.write("Valid email address.");
        } else {
            document.write("Invalid email address. Please enter a valid email.");
        }
    </script>
</body>
</html>
