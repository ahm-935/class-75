<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factorial</title>
</head>
<body>
    <script>
        let num =parseInt(prompt("Enter a number"));
        let result = 1;
        if (num>0){
            for(let i = num; i > 0; i--){
                result *=i; 
            }
            document.write("The Factorial of "+num+" is:  "+result);
        }
        else{
            document.write("Please enter a positive number");
        }
    </script>
</body>
</html>
