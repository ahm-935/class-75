<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loop</title>
</head>
<body>
    <script>
        for (let i = 10; i > 0; i--) {
            document.write(i + "<br>");
        }
        document.write("<br>");
       let sum = 0;
        for (let i = 1; i <= 10; i++) {
            sum += i;
        }
        document.write("The sum is: " + sum);
    </script>
</body>
</html>
