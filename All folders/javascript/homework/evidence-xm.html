<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highest-Lowest Number</title>
</head>
<body>
    <script>
        let num1 = parseInt(prompt("Enter the first number: "));
        let num2 = parseInt(prompt("Enter the second number: "));
        let num3 = parseInt(prompt("Enter the third number: "));
        if(num1>num2 && num1>num3){
            document.write("the Highest number is: "+num1);
        }
        else if(num2>num1 && num2>num3){
            document.write("the Highest number is: "+num2);
        }
        else{
            document.write("the Highest number is: "+num3);
        }
        document.write("<br>");
        if(num1<num2 && num1<num3){
            document.write("the Lowest number is: "+num1);
        }
        else if(num2<num1 && num2<num3){
            document.write("the Lowest number is: "+num2);
        }
        else{
            document.write("the Lowest number is: "+num3);
        }

    </script>
</body>
</html>
