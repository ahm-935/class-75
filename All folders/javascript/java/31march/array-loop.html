<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>array-loop</title>
</head>

<body>
    <script>
        document.write("<hr>");
        let arr = ["Apple", "Banana", "Cherry"];
        for(let i = 0; i < arr.length; i++) {
            document.write(arr[i] + "<br>");
        }
        document.write("<hr>");
        for(let i in arr) {
            document.write(arr[i] + "<br>");
        }
        document.write("<hr>");

    </script>
</body>

</html>
