<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Push-Pop</title>
</head>

<body>

    <script>
        let arr = [];
        arr.push("Mina","Raju", "Mithu"); // Adding an element to the end of the array
        console.log(arr);
        arr.push("Arif");
        console.log(arr);

        arr.pop(); // Removing the last element from the array
        console.log(arr);
        arr.pop(); // Removing the last element from the array
        console.log(arr);

        arr.unshift("Mehu"); // Adding an element to the beginning of the array
        console.log(arr);
        arr.unshift("Himu");
        console.log(arr);

        arr.shift(); // Removing the first element from the array
        console.log(arr);
        arr.shift(); // Removing the first element from the array
        console.log(arr);

        console.log(arr.includes("Mina")); // Checking if an element exists in the array
        console.log(arr.indexOf("Himu")); // Finding the index of an element in the array
        console.log(arr.indexOf("Raju")); // Finding the index of an element in the array

    </script>


</body>

</html>
