<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>
    <script>
        let arr = ["Watermelon", "Apple", "Mango", "banana", "Cherry","Pineapple", "Orange"];
        console.log(arr);
        arr.sort(); // Sorting the array in ascending order
        console.log(arr);
        arr.reverse(); // Reversing the order of the array
        console.log(arr);

        let arr2 = [101, 50, 200, 10, 5, 150];
        console.log(arr2);
        arr2.sort((a, b) => a - b); // Sorting the array in ascending order
        console.log(arr2);
        arr2.sort((a, b) => b -a); // Sorting the array in descending order
        console.log(arr2);



    </script>
</body>

</html>
