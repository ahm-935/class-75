<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // loop
        //___________________________
        // for
        // while
        // do while

        for (let i = 1; i <= 10; i++) {
            document.write(i + "<br>");
        }
        document.writeln("---------<br>");
        for (let i = 5; i > 0; i--) {
            document.write(i + "<br>");
        }

         document.writeln("---------<br>");
         for (let i = 2; i <= 22;i+=2) {
             
                 document.write(i + "<br>");
             }
               document.writeln("---------<br>");
         for (let i = 1; i <= 8;i+=2) {
             
                 document.write(i + "<br>");
             }
         

        //Step 1: Initialize
        //Step 2: Condition
        //Step 3: if condition is true then Increment/Decrement, or else break
        //Step 4: Increment/Decrement
        //Step 5: Repeat Step 2
          document.writeln("---------While<br>");
          
          let j = 1;
          while (j <= 10) {
              document.write(j + "<br>");
              j++;
            }
            
            document.writeln("---------Do While<br>");


            let k = 1;
            do {
                document.write(k + "<br>");
                ++k;
            } while (k >= 3);


    </script>
</body>
</html>
