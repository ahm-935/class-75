<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operators</title>
</head>
<body>
    <script>
        // 1. Arithmatic Operators
        // 2. Assignment Operators
        // 3. Comparison Operators
        // 4. Logical Operators
        // 5. Unary Operators
        // 6. Ternary Operators
        // 7. Bitwise Operators

        // 1. Arithmetic Operators
        //   +, -, *, /

        let a = 3;
        let b = "3"
        console.log(a+b)
        console.log(a-b)
        console.log(a*b)
        console.log(a/b)
        console.log(a%b)
        console.log(a**b)

          // 2. Assignment Operators
        //   =,+=, -+, *=, /=, %=
        console.log(); 
        let c = 20;
        console.log(c); // 20
        c += 5;  // c = c + 5
        console.log(c); // 25
        c -= 10; // c = c - 10
        console.log(c); //15
        c *= 2; // c = c * 2
        console.log(c); // 30
        c /= 6; // c = c / 6
        console.log(c); // 5
        c %= 2; // c = c % 2
        console.log(c); //1         

        // 3. Comparison Operators
        // ==, ===, !=, !==, < ,> , >=, <=
        
        let d = 10;
        let e = "10";
        console.log(d==e);  // compare value
        console.log(d===e);  // compare value and type
        console.log(d!=e);  // compare value
        console.log(d!==e);  // compare value and type
        
        let f = 5;
        let g = 6;
        console.log(f<g);
        console.log(f>g);
        console.log(f<=g);
        console.log(f>=g);
        
        // 4. Logical Operators
        // && (AND), || (OR), ! (NOT)
        let h = true;
        let i = false;
        console.log(h&&i);
        console.log(h||i);
        console.log(!h);
        console.log(!i);

        // 5. Unary Operations
        // ++ (increment), --(decrement)
        let j = 10;
        console.log(j); //10
        console.log(j++); //10 ->11
        console.log(j); //11
        console.log(++j); // 12
        console.log(j--); // 12  ->11
        console.log(--j); // 10  (11-1)

        // 6. Ternary Operators
        // condition ? true : false
        let k = 10;
        let l = 20;
        let m = k > l ? "k is greater than l" : "l is greater than k";
        console.log(m);

        // 7. Bitwise Operators
        // & (AND), | (OR), ~ (NOT), ^ (XOR), << (LEFT SHIFT), >> (RIGHT SHIFT)

    </script>
</body>
</html>
