<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Largest lowest number</title>
</head>
<body>
    
<script>

    let num1 =prompt("Enter First number");
    let num2 =prompt("Enter Second Number");
    let num3 =prompt("Enter Third Number");

   if (num1>num2 && num1>num3){
    document.write("Largest number is " + num1);
   }
   else if (num2>num1 && num2>num3){
    document.write("Largest number is " + num2);
   }
   else {
    document.write("Largest number is " + num3);
   }

  document.write("<br>")

   if (num1<num2 && num1<num3){
    document.write("Lowest number is " + num1);
   }
   else if (num2<num1 && num2<num3){
    document.write("Lowest number is " + num2);
   }
   else {
    document.write("Lowest number is " + num3);
   }
    
   </script>


</body>
</html>
